<!doctype html>
<html lang="zh-Hant">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" content="#ac1f2c" />
		<script>
			// Apply theme before paint to avoid a flash of the wrong mode.
			try {
				const t = localStorage.getItem('theme');
				if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches))
					document.documentElement.classList.add('dark');
			} catch (e) {}
			// Hide the prerendered stage-curtain before paint if it already played this
			// session, so returning visitors don't see it flash before hydration.
			try {
				if (sessionStorage.getItem('introShown'))
					document.documentElement.classList.add('intro-seen');
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			// Register the service worker for offline support / installability.
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', () => {
					try {
						navigator.serviceWorker.register('/sw.js');
					} catch (e) {}
				});
			}
		</script>
	</body>
</html>
