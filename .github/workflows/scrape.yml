name: Scrape & refresh snapshot

# 定時抓取各售票平台的戲劇節目，更新 static/shows.json 快照並 commit。
# 若有連接 Vercel / Pages，push 後會自動重新部署，公開站台資料即更新。
on:
  schedule:
    - cron: '0 0,12 * * *' # 每天 00:00 / 12:00 UTC（台北 08:00 / 20:00）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Scrape and export snapshot
        run: npm run scrape
      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- static/shows.json; then
            echo "No changes in snapshot."
          else
            git add static/shows.json
            git commit -m "chore: refresh shows snapshot [skip ci]"
            git push
          fi
