name: Scrape & refresh data

# Periodically scrape all ticketing platforms, regenerate static/shows.json and
# static/feed.xml, and commit them. When connected to Vercel / Pages, the push
# triggers an automatic redeploy so the live site updates. No secrets required.
on:
  schedule:
    - cron: '0 0,12 * * *' # 00:00 / 12:00 UTC (08:00 / 20:00 Taipei)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Scrape and regenerate data
        run: npm run scrape
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- static/shows.json static/feed.xml; then
            echo "No data changes."
          else
            git add static/shows.json static/feed.xml
            git commit -m "chore: refresh show data [skip ci]"
            git push
          fi
